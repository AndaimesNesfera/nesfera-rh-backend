/* ══ MODAL UPLOAD DOC ═══════════════════════════════════════════════════ */
const CATS=['ASO / Saúde Ocupacional','NR-35 / Trabalho em Altura','NR-18 / Construção Civil','CNH / Habilitação','Contrato / Admissão','Treinamentos','EPI / Equipamentos','Outros'];
function ModalDoc({funcId,onClose,onSave,toast}){
  const[f,setF]=useState({nome:'',categoria:'',validade:'',data_inicio:''});
  const[arq,setArq]=useState(null);const[loading,setLoading]=useState(false);
  const isASO=f.categoria==='ASO / Saúde Ocupacional';
  const save=async()=>{
    if(!f.nome||!f.categoria||!arq){toast('Preencha nome, categoria e arquivo','error');return;}
    if(arq.size>15*1024*1024){toast('Arquivo muito grande (máx 15MB)','error');return;}
    setLoading(true);
    const b64=await fileToB64(arq);
    const docData={funcId,nome:f.nome,categoria:f.categoria,validade:f.validade||null,arquivo:b64,tipo:arq.type,tamanho:arq.size,nomeArq:arq.name,criadoEm:new Date().toISOString()};
    if(isASO&&f.data_inicio)docData.data_inicio=f.data_inicio;
    await dbAdd('documentos',docData);
    setLoading(false);toast('Documento adicionado!');onSave();onClose();
  };
  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="mbox">
        <div className="mhdr"><h5>📎 Adicionar Documento</h5><button className="btn-ghost" onClick={onClose}><i className="bi bi-x-lg"></i></button></div>
        <div className="mbdy">
          <div className="row g-3">
            <div className="col-12"><label className="form-label">Nome do documento *</label><input className="form-control" value={f.nome} onChange={e=>setF({...f,nome:e.target.value})} placeholder="Ex: ASO 2025, NR-35 Renovação..."/></div>
            <div className="col-12"><label className="form-label">Categoria *</label><select className="form-select" value={f.categoria} onChange={e=>setF({...f,categoria:e.target.value})}><option value="">Selecione a categoria...</option>{CATS.map(c=><option key={c}>{c}</option>)}</select></div>
            {isASO&&<div className="col-12"><label className="form-label">Data de Início do ASO</label><input type="date" className="form-control" value={f.data_inicio} onChange={e=>setF({...f,data_inicio:e.target.value})}/></div>}
            <div className="col-12"><label className="form-label">Data de Validade (se aplicável)</label><input type="date" className="form-control" value={f.validade} onChange={e=>setF({...f,validade:e.target.value})}/></div>
            <div className="col-12"><label className="form-label">Arquivo * (PDF, imagem — máx. 15MB)</label><input type="file" className="form-control" accept=".pdf,.doc,.docx,.png,.jpg,.jpeg,.webp" onChange={e=>setArq(e.target.files[0])}/>{arq&&<div style={{fontSize:11,color:'var(--tx3)',marginTop:5}}>{arq.name} · {fmtBytes(arq.size)}</div>}</div>
          </div>
        </div>
        <div className="mftr">
          <button className="btn-secondary" onClick={onClose}>Cancelar</button>
          <button className="btn-primary" onClick={save} disabled={loading}>{loading?<><span className="spinner-border spinner-border-sm"></span>Enviando...</>:<><i className="bi bi-upload"></i>Adicionar</>}</button>
        </div>
      </div>
    </div>
  );
}

/* ══ PERFIL FUNCIONÁRIO ═════════════════════════════════════════════════ */
function Perfil({id,onBack,toast,onEnvio}){
  const[func,setFunc]=useState(null);const[docs,setDocs]=useState([]);
  const[editando,setEditando]=useState(false);const[uploadDoc,setUploadDoc]=useState(false);const[confirmDel,setConfirmDel]=useState(null);
  const[confirmDesligar,setConfirmDesligar]=useState(false);
  const load=async()=>{const f=await dbGet('funcionarios',id);const all=await dbGetAll('documentos');setFunc(f);setDocs(all.filter(d=>d.funcId===id));};
  useEffect(()=>{load();},[id]);
  const delDoc=async docId=>{await dbDel('documentos',docId);toast('Documento removido','success');load();setConfirmDel(null);};
  const desligarFunc=async()=>{await dbPut('funcionarios',{...func,ativo:false,desligadoEm:new Date().toISOString().slice(0,10)});toast(`${func.nome} desligado.`,'success');setConfirmDesligar(false);onBack();};
  if(!func)return<div className="text-center py-5"><div className="spinner-border" style={{color:'var(--or)'}}></div></div>;
  const porCat={};docs.forEach(d=>{if(!porCat[d.categoria])porCat[d.categoria]=[];porCat[d.categoria].push(d);});
  const vCount=docs.filter(d=>vencSt(d.validade)?.cls==='err').length;
  const wCount=docs.filter(d=>vencSt(d.validade)?.cls==='warn').length;
  const emFerias=isEmFerias(func);
  const emExp=isEmExperiencia(func);
  const anivHoje=aniversarioHoje(func);
  return(
    <div className="page-anim">
      {editando&&<ModalFunc func={func} onClose={()=>setEditando(false)} onSave={load} toast={toast}/>}
      {uploadDoc&&<ModalDoc funcId={func.id} onClose={()=>setUploadDoc(false)} onSave={load} toast={toast}/>}
      {confirmDel&&(
        <div className="modal-overlay">
          <div className="mbox" style={{maxWidth:400}}>
            <div className="mbdy text-center" style={{padding:'36px 28px'}}>
              <div style={{fontSize:48,marginBottom:12}}>🗑️</div>
              <h5 style={{fontWeight:700,marginBottom:8}}>Remover documento?</h5>
              <p style={{fontSize:13,color:'var(--tx3)'}}>Esta ação não pode ser desfeita.</p>
            </div>
            <div className="mftr justify-content-center gap-2">
              <button className="btn-secondary" onClick={()=>setConfirmDel(null)}>Cancelar</button>
              <button className="btn-danger" onClick={()=>delDoc(confirmDel)}>Remover</button>
            </div>
          </div>
        </div>
      )}
      {confirmDesligar&&(
        <div className="modal-overlay">
          <div className="mbox" style={{maxWidth:400}}>
            <div className="mbdy text-center" style={{padding:'36px 28px'}}>
              <div style={{fontSize:48,marginBottom:12}}>⚠️</div>
              <h5 style={{fontWeight:700,marginBottom:8}}>Desligar {func?.nome}?</h5>
              <p style={{fontSize:13,color:'var(--tx3)'}}>O colaborador será movido para "Desligados" e não aparecerá mais nos módulos ativos. Você pode reativá-lo a qualquer momento.</p>
            </div>
            <div className="mftr justify-content-center gap-2">
              <button className="btn-secondary" onClick={()=>setConfirmDesligar(false)}>Cancelar</button>
              <button className="btn-danger" onClick={desligarFunc}><i className="bi bi-person-dash me-1"></i>Confirmar Desligamento</button>
            </div>
          </div>
        </div>
      )}
      <button className="btn-ghost mb-3" onClick={onBack}><i className="bi bi-arrow-left"></i>Voltar para Funcionários</button>
      <div className="card-m mb-4" style={{padding:'24px 28px'}}>
        <div className="d-flex align-items-center gap-4 flex-wrap">
          <div className="avatar" style={{width:80,height:80,fontSize:34,background:'linear-gradient(135deg,#FED7AA,#FDBA74)'}}>
            {func.foto?<img src={func.foto} alt={func.nome}/>:'👷'}
          </div>
          <div style={{flex:1}}>
            <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap',marginBottom:6}}>
              <h3 style={{fontWeight:800,fontSize:20,margin:0}}>{func.nome}</h3>
              {anivHoje&&<span className="badge-orange">🎂 Aniversário hoje!</span>}
              {emFerias&&<span className="badge-ok">🏖️ Em Férias</span>}
              {emExp&&<span className="badge-purple">📋 Em Experiência</span>}
              {vCount>0&&<span className="badge-err">{vCount} doc(s) vencido(s)</span>}
              {wCount>0&&<span className="badge-warn">{wCount} vencendo</span>}
            </div>
            <div style={{fontSize:13,color:'var(--tx2)',display:'flex',flexWrap:'wrap',gap:'6px 20px'}}>
              {func.cargo&&<span><i className="bi bi-briefcase me-1"></i>{func.cargo}</span>}
              {func.telefone&&<span><i className="bi bi-telephone me-1"></i>{func.telefone}</span>}
              {func.email&&<span><i className="bi bi-envelope me-1"></i>{func.email}</span>}
            </div>
            <div style={{fontSize:12,color:'var(--tx3)',marginTop:6,display:'flex',flexWrap:'wrap',gap:'4px 16px'}}>
              {func.cpf&&<span>CPF: {func.cpf}</span>}
              {func.rg&&<span>RG: {func.rg}</span>}
              {func.data_admissao&&<span>Admissão: {fmtDate(func.data_admissao)}</span>}
              {func.data_nascimento&&<span>Nascimento: {fmtDate(func.data_nascimento)}</span>}
              {func.tam_bota&&<span><i className="bi bi-droplet me-1"></i>Bota: Nº {func.tam_bota}</span>}
              {func.tam_uniforme&&<span><i className="bi bi-person-arms-up me-1"></i>Uniforme: {func.tam_uniforme}</span>}
            </div>
            {(emFerias||emExp)&&(
              <div style={{marginTop:8,display:'flex',gap:8,flexWrap:'wrap'}}>
                {emFerias&&<span style={{fontSize:12,color:'#059669',background:'#ECFDF5',padding:'3px 10px',borderRadius:8,border:'1px solid #A7F3D0'}}>🏖️ Férias: {fmtDate(func.ferias_inicio)} → {fmtDate(func.ferias_fim)}</span>}
                {emExp&&getExperienciaPeriodos(func).map((p,i)=>(
                  <span key={i} style={{fontSize:12,color:p.encerrado?'#64748B':'#7C3AED',background:p.encerrado?'#F1F5F9':'#F5F3FF',padding:'3px 10px',borderRadius:8,border:`1px solid ${p.encerrado?'#CBD5E1':'#DDD6FE'}`}}>
                    📋 {p.label}: {p.inicio?fmtDate(p.inicio):''}{p.inicio&&p.fim?' → ':''}{p.fim?fmtDate(p.fim):''}
                    {p.encerrado?' ✓ Encerrado':''}
                  </span>
                ))}
              </div>
            )}
          </div>
          <div className="d-flex gap-2 flex-wrap">
            <button className="btn-secondary" onClick={()=>onEnvio([func.id])}><i className="bi bi-send"></i>Enviar Docs</button>
            <button className="btn-primary" onClick={()=>setUploadDoc(true)}><i className="bi bi-plus-lg"></i>Adicionar Doc</button>
            <button className="btn-ghost" onClick={()=>setEditando(true)}><i className="bi bi-pencil"></i>Editar</button>
            <button className="btn-danger" onClick={()=>setConfirmDesligar(true)}><i className="bi bi-person-dash"></i>Desligar</button>
          </div>
        </div>
      </div>
      {Object.keys(porCat).length===0?(
        <div className="card-m"><div className="empty"><i className="bi bi-file-earmark-plus"></i><h3>Nenhum documento ainda</h3><p style={{fontSize:13}}>Clique em "Adicionar Doc" para enviar o primeiro documento.</p></div></div>
      ):(
        Object.entries(porCat).map(([cat,cdocs])=>(
          <div key={cat} className="card-m mb-3" style={{overflow:'hidden'}}>
            <div style={{padding:'14px 22px',borderBottom:'1px solid var(--bd)',background:'#FAFBFC',display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontWeight:700,fontSize:13,color:'var(--tx)'}}>{cat}</span>
              <span style={{fontSize:11,background:cdocs.length>0?'#E0F2FE':'#F1F5F9',color:cdocs.length>0?'#0369A1':'var(--tx3)',padding:'1px 8px',borderRadius:20,fontWeight:600}}>{cdocs.length}</span>
            </div>
            <div style={{padding:'12px 22px'}}>
              {cdocs.map(doc=>{const v=doc.validade?vencSt(doc.validade):null;return(
                <div key={doc.id} className="doc-row">
                  <div className="doc-icon-wrap" style={{background:'#F8FAFC'}}>{fileIcon(doc.tipo)}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:600}}>{doc.nome}</div>
                    <div style={{fontSize:11,color:'var(--tx3)'}}>
                      {fmtBytes(doc.tamanho)}
                      {doc.data_inicio?` · Início ASO: ${fmtDate(doc.data_inicio)}`:''}
                      {doc.validade?` · Validade: ${fmtDate(doc.validade)}`:''}
                    </div>
                  </div>
                  {v&&<span className={v.badge}>{v.label}</span>}
                  <div className="d-flex gap-1">
                    <a href={doc.arquivo} download={doc.nomeArq||doc.nome} className="btn-ghost" title="Baixar"><i className="bi bi-download"></i></a>
                    <button className="btn-ghost" title="Visualizar" onClick={()=>{const w=window.open();w.document.write(`<iframe src="${doc.arquivo}" style="width:100%;height:100vh;border:none"></iframe>`)}}><i className="bi bi-eye"></i></button>
                    <button className="btn-ghost" style={{color:'var(--err)'}} title="Remover" onClick={()=>setConfirmDel(doc.id)}><i className="bi bi-trash"></i></button>
                  </div>
                </div>
              );})}
            </div>
          </div>
        ))
      )}
    </div>
  );
}

/* ══ LISTA FUNCIONÁRIOS ═════════════════════════════════════════════════ */
function Funcionarios({onPerfil,toast}){
  const[lista,setLista]=useState([]);const[busca,setBusca]=useState('');
  const[modal,setModal]=useState(false);const[docCounts,setDocCounts]=useState({});
  const[tabAtivos,setTabAtivos]=useState(true);
  const load=async()=>{
    const[fs,ds]=await Promise.all([dbGetAll('funcionarios'),dbGetAll('documentos')]);
    setLista(fs);
    const cnt={};fs.forEach(f=>{const fd=ds.filter(d=>d.funcId===f.id);cnt[f.id]={total:fd.length,venc:fd.filter(d=>vencSt(d.validade)?.cls==='err').length,vencendo:fd.filter(d=>vencSt(d.validade)?.cls==='warn').length};});
    setDocCounts(cnt);
  };
  useEffect(()=>{load();},[]);
  const ativos=lista.filter(f=>f.ativo!==false);
  const desligados=lista.filter(f=>f.ativo===false);
  const baseList=tabAtivos?ativos:desligados;
  const filtrados=baseList.filter(f=>f.nome.toLowerCase().includes(busca.toLowerCase())||(f.cargo||'').toLowerCase().includes(busca.toLowerCase()));
  const reativar=async(f)=>{await dbPut('funcionarios',{...f,ativo:true,desligadoEm:null});toast(`✅ ${f.nome} reativado!`);load();};
  return(
    <div className="page-anim">
      {modal&&<ModalFunc onClose={()=>setModal(false)} onSave={load} toast={toast}/>}
      <div className="d-flex gap-3 mb-3 align-items-center flex-wrap">
        <div style={{display:'flex',gap:6}}>
          <button className={tabAtivos?'btn-primary':'btn-secondary'} style={{padding:'7px 16px',fontSize:12}} onClick={()=>setTabAtivos(true)}>
            <i className="bi bi-person-check me-1"></i>Ativos ({ativos.length})
          </button>
          <button className={!tabAtivos?'btn-primary':'btn-secondary'} style={{padding:'7px 16px',fontSize:12}} onClick={()=>setTabAtivos(false)}>
            <i className="bi bi-person-dash me-1"></i>Desligados ({desligados.length})
          </button>
        </div>
        <div style={{flex:1,minWidth:200}} className="search-wrap"><i className="bi bi-search"></i><input className="form-control" placeholder="Buscar por nome ou cargo..." value={busca} onChange={e=>setBusca(e.target.value)}/></div>
        {tabAtivos&&<button className="btn-primary" onClick={()=>setModal(true)}><i className="bi bi-person-plus-fill"></i>Novo Funcionário</button>}
      </div>
      {filtrados.length===0?(
        <div className="card-m"><div className="empty"><i className="bi bi-people"></i><h3>{busca?'Nenhum resultado':tabAtivos?'Nenhum funcionário ativo':'Nenhum funcionário desligado'}</h3><p style={{fontSize:13}}>{!busca&&tabAtivos&&'Clique em "Novo Funcionário" para começar.'}</p></div></div>
      ):(
        <div className="row g-3">
          {filtrados.map(f=>{const c=docCounts[f.id]||{total:0,venc:0,vencendo:0};const emF=isEmFerias(f);const emE=isEmExperiencia(f);const anivH=aniversarioHoje(f);return(
            <div key={f.id} className="col-12 col-sm-6 col-xl-4">
              {tabAtivos?(
                <div className="fc" onClick={()=>onPerfil(f.id)}>
                  <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:14}}>
                    <div className="avatar" style={{width:56,height:56,fontSize:24,background:'linear-gradient(135deg,#FED7AA,#FDBA74)'}}>
                      {f.foto?<img src={f.foto} alt={f.nome}/>:'👷'}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:14,fontWeight:700,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{f.nome}</div>
                      <div style={{fontSize:12,color:'var(--tx3)'}}>{f.cargo||'Sem cargo'}</div>
                    </div>
                  </div>
                  <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                    <span className="badge-gray">{c.total} docs</span>
                    {c.venc>0&&<span className="badge-err">{c.venc} vencido(s)</span>}
                    {c.vencendo>0&&<span className="badge-warn">{c.vencendo} vencendo</span>}
                    {anivH&&<span className="badge-orange">🎂</span>}
                    {emF&&<span className="badge-ok">🏖️ Férias</span>}
                    {emE&&<span className="badge-purple">📋 Experiência</span>}
                  </div>
                </div>
              ):(
                <div className="card-m" style={{padding:16,opacity:.85}}>
                  <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:10}}>
                    <div className="avatar" style={{width:48,height:48,fontSize:22,background:'#F1F5F9'}}>
                      {f.foto?<img src={f.foto} alt={f.nome}/>:'👷'}
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:13}}>{f.nome}</div>
                      <div style={{fontSize:11,color:'var(--tx3)'}}>{f.cargo||'—'}</div>
                      {f.desligadoEm&&<div style={{fontSize:10,color:'var(--err)'}}>Desligado em {fmtDate(f.desligadoEm)}</div>}
                    </div>
                  </div>
                  <div style={{display:'flex',gap:8}}>
                    <button className="btn-secondary" style={{flex:1,justifyContent:'center',fontSize:11,padding:'5px'}} onClick={()=>onPerfil(f.id)}>Ver perfil</button>
                    <button className="btn-secondary" style={{flex:1,justifyContent:'center',fontSize:11,padding:'5px',borderColor:'var(--ok)',color:'var(--ok)'}} onClick={()=>reativar(f)}>Reativar</button>
                  </div>
                </div>
              )}
            </div>
          );})}
        </div>
      )}
    </div>
  );
}

/* ══ ENVIO DE DOCUMENTOS ════════════════════════════════════════════════ */
function Envio({toast,preIds}){
  const[step,setStep]=useState(1);
  const[funcs,setFuncs]=useState([]);const[selFuncs,setSelFuncs]=useState(preIds||[]);
  const[docsData,setDocsData]=useState([]);const[selDocs,setSelDocs]=useState([]);
  const[busca,setBusca]=useState('');const[form,setForm]=useState({dest:'',contato:'',canal:'whatsapp',obs:''});
  const[loading,setLoading]=useState(false);
  useEffect(()=>{dbGetAll('funcionarios').then(fs=>setFuncs(fs.filter(f=>f.ativo!==false)));},[]);
  useEffect(()=>{if(preIds&&preIds.length>0){setSelFuncs(preIds);setStep(1);}},[JSON.stringify(preIds)]);
  const filtrados=funcs.filter(f=>f.nome.toLowerCase().includes(busca.toLowerCase())||(f.cargo||'').toLowerCase().includes(busca.toLowerCase()));
  const togFunc=id=>setSelFuncs(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const togAll=()=>setSelFuncs(selFuncs.length===filtrados.length&&filtrados.length>0?[]:filtrados.map(f=>f.id));
  const avancar=async()=>{
    if(selFuncs.length===0){toast('Selecione ao menos um funcionário','error');return;}
    const allDocs=await dbGetAll('documentos');
    const data=await Promise.all(selFuncs.map(async id=>{const f=await dbGet('funcionarios',id);return{...f,documentos:allDocs.filter(d=>d.funcId===id)};}));
    setDocsData(data);setSelDocs(data.flatMap(f=>f.documentos.map(d=>d.id)));setStep(2);
  };
  const togDoc=id=>setSelDocs(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const enviar=async()=>{
    if(!form.dest){toast('Informe o destinatário','error');return;}
    if(selDocs.length===0){toast('Selecione ao menos um documento','error');return;}
    setLoading(true);
    // Monta mensagem e lista de docs selecionados
    const linhas=docsData.flatMap(f=>f.documentos.filter(function(d){return selDocs.includes(d.id);}).map(function(d){return '• '+f.nome+' — '+d.nome;})).join('\n');
    const msg='Olá '+form.dest+'!\n\nSegue a documentação dos funcionários da Andaimes Nesfera:\n\n👷 Funcionários: '+docsData.map(function(f){return f.nome;}).join(', ')+'\n📄 Total: '+selDocs.length+' documento(s)\n\n'+linhas+'\n\nAtenciosamente,\nAndaimes Nesfera';
    // Registra no histórico
    try{
      if(API_URL){
        await apiFetch('POST','historico',{destNome:form.dest,destContato:form.contato,canal:form.canal,funcIds:selFuncs,docIds:selDocs,obs:form.obs,criadoEm:new Date().toISOString()});
      }else{
        await dbAdd('historico',{destNome:form.dest,destContato:form.contato,canal:form.canal,funcIds:selFuncs,docIds:selDocs,obs:form.obs,criadoEm:new Date().toISOString()});
      }
    }catch(he){console.error('Erro ao salvar histórico:',he);}
    // ── MODO NUVEM: envio automático ──────────────────────────────────────
    if(API_URL){
      // Monta lista de anexos com base64
      const attachments=docsData.flatMap(function(f){
        return f.documentos.filter(function(d){return selDocs.includes(d.id);}).map(function(d){
          return {filename:(d.nomeArq||d.nome||'documento')+'.'+(d.tipo&&d.tipo.includes('pdf')?'pdf':d.tipo&&d.tipo.includes('image')?'jpg':'pdf'),data:d.arquivo||'',mimeType:d.tipo||'application/pdf'};
        });
      });
      try{
        if(form.canal==='whatsapp'){
          const tel=form.contato.replace(/\D/g,'');
          await apiFetch('POST','send-whatsapp',{phone:tel,message:msg,attachments:attachments});
          toast('📱 WhatsApp enviado automaticamente! ✅');
        }else{
          await apiFetch('POST','send-email',{to:form.contato,toName:form.dest,message:msg,attachments:attachments});
          toast('📧 E-mail enviado automaticamente! ✅');
        }
      }catch(sendErr){
        console.error('Erro no envio automático:',sendErr);
        toast('⚠️ Erro no envio automático: '+sendErr.message,'error');
        setLoading(false);return;
      }
    }else{
      // ── MODO LOCAL: abre app externo ─────────────────────────────────
      if(form.canal==='whatsapp'){const tel=form.contato.replace(/\D/g,'');window.open(tel?'https://wa.me/55'+tel+'?text='+encodeURIComponent(msg):'https://wa.me/?text='+encodeURIComponent(msg),'_blank');toast('📱 WhatsApp aberto! Envio registrado.');}
      else{window.open('mailto:'+form.contato+'?subject='+encodeURIComponent('Documentação — Andaimes Nesfera')+'&body='+encodeURIComponent(msg),'_blank');toast('📧 E-mail preparado! Envio registrado.');}
    }
    setLoading(false);
    setStep(1);setSelFuncs([]);setSelDocs([]);setForm({dest:'',contato:'',canal:'whatsapp',obs:''});
  };
  const StepBar=()=>(
    <div className="step-bar">
      {[{n:1,l:'Funcionários'},{n:2,l:'Documentos'},{n:3,l:'Envio'}].map((s,i)=>(
        <React.Fragment key={s.n}>
          <div className="step-n">
            <div className="step-circle" style={{background:step>=s.n?'var(--or)':'var(--bd)',color:step>=s.n?'#fff':'var(--tx3)'}}>{step>s.n?<i className="bi bi-check"></i>:s.n}</div>
            <span className="step-label" style={{fontWeight:step===s.n?700:500,color:step>=s.n?'var(--tx)':'var(--tx3)'}}>{s.l}</span>
          </div>
          {i<2&&<div className="step-line" style={{background:step>s.n?'var(--or)':'var(--bd)'}}></div>}
        </React.Fragment>
      ))}
    </div>
  );
  return(
    <div className="page-anim">
      <StepBar/>
      {step===1&&(
        <div>
          <div className="card-m mb-3" style={{overflow:'hidden'}}>
            <div style={{padding:'14px 22px',borderBottom:'1px solid var(--bd)',display:'flex',justifyContent:'space-between',alignItems:'center',gap:12,flexWrap:'wrap'}}>
              <strong style={{fontSize:14}}>Selecione os funcionários</strong>
              <div style={{display:'flex',gap:8}}>
                <div className="search-wrap"><i className="bi bi-search"></i><input className="form-control form-control-sm" style={{paddingLeft:34,width:180}} placeholder="Buscar..." value={busca} onChange={e=>setBusca(e.target.value)}/></div>
                <button className="btn-secondary" style={{padding:'5px 14px',fontSize:12}} onClick={togAll}>{selFuncs.length===filtrados.length&&filtrados.length>0?'Desmarcar todos':'Selecionar todos'}</button>
              </div>
            </div>
            <div style={{padding:16}}>
              {filtrados.length===0?<div style={{textAlign:'center',color:'var(--tx3)',padding:'24px',fontSize:13}}>Nenhum funcionário cadastrado</div>:
                filtrados.map(f=>(
                  <div key={f.id} className={`sel-item ${selFuncs.includes(f.id)?'on':''}`} onClick={()=>togFunc(f.id)}>
                    <input type="checkbox" readOnly checked={selFuncs.includes(f.id)}/>
                    <div className="avatar" style={{width:40,height:40,fontSize:18,background:'linear-gradient(135deg,#FED7AA,#FDBA74)'}}>{f.foto?<img src={f.foto} alt={f.nome}/>:'👷'}</div>
                    <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{f.nome}</div><div style={{fontSize:11,color:'var(--tx3)'}}>{f.cargo||'Sem cargo'}</div></div>
                  </div>
                ))
              }
            </div>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:13,color:'var(--tx3)'}}>{selFuncs.length} funcionário(s) selecionado(s)</span>
            <button className="btn-primary" onClick={avancar} disabled={selFuncs.length===0}>Próximo: Documentos<i className="bi bi-arrow-right ms-1"></i></button>
          </div>
        </div>
      )}
      {step===2&&(
        <div>
          {docsData.map(f=>(
            <div key={f.id} className="card-m mb-3" style={{overflow:'hidden'}}>
              <div style={{padding:'14px 22px',borderBottom:'1px solid var(--bd)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <strong style={{fontSize:13}}>👷 {f.nome}</strong>
                <button className="btn-ghost" style={{fontSize:12}} onClick={()=>{const ids=f.documentos.map(d=>d.id);const all=ids.every(id=>selDocs.includes(id));setSelDocs(p=>all?p.filter(id=>!ids.includes(id)):[...new Set([...p,...ids])]);}}>
                  {f.documentos.every(d=>selDocs.includes(d.id))&&f.documentos.length>0?'Desmarcar todos':'Selecionar todos'}
                </button>
              </div>
              <div style={{padding:16}}>
                {f.documentos.length===0?<div style={{color:'var(--tx3)',textAlign:'center',padding:'12px',fontSize:13}}>Nenhum documento</div>:
                  f.documentos.map(doc=>{const v=doc.validade?vencSt(doc.validade):null;return(
                    <div key={doc.id} className={`sel-item ${selDocs.includes(doc.id)?'on':''}`} onClick={()=>togDoc(doc.id)}>
                      <input type="checkbox" readOnly checked={selDocs.includes(doc.id)}/>
                      <span style={{fontSize:22}}>{fileIcon(doc.tipo)}</span>
                      <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{doc.nome}</div><div style={{fontSize:11,color:'var(--tx3)'}}>{doc.categoria}{doc.validade?` · ${fmtDate(doc.validade)}`:''}</div></div>
                      {v&&<span className={v.badge}>{v.label}</span>}
                    </div>
                  );})}
              </div>
            </div>
          ))}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <button className="btn-secondary" onClick={()=>setStep(1)}><i className="bi bi-arrow-left"></i>Voltar</button>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <span style={{fontSize:13,color:'var(--tx3)'}}>{selDocs.length} documento(s)</span>
              <button className="btn-primary" onClick={()=>setStep(3)} disabled={selDocs.length===0}>Confirmar envio<i className="bi bi-arrow-right ms-1"></i></button>
            </div>
          </div>
        </div>
      )}
      {step===3&&(
        <div>
          <div className="card-m mb-3">
            <div style={{padding:'14px 22px',borderBottom:'1px solid var(--bd)'}}><strong>Resumo</strong></div>
            <div style={{padding:'18px 22px'}}>
              <div className="row g-2 mb-3">
                <div className="col-6"><div style={{background:'var(--bg)',borderRadius:12,padding:'14px 18px'}}><div style={{fontSize:11,color:'var(--tx3)',fontWeight:700,textTransform:'uppercase',marginBottom:4}}>Funcionários</div><div style={{fontSize:24,fontWeight:800}}>{selFuncs.length}</div></div></div>
                <div className="col-6"><div style={{background:'var(--bg)',borderRadius:12,padding:'14px 18px'}}><div style={{fontSize:11,color:'var(--tx3)',fontWeight:700,textTransform:'uppercase',marginBottom:4}}>Documentos</div><div style={{fontSize:24,fontWeight:800}}>{selDocs.length}</div></div></div>
              </div>
              <div style={{fontSize:12,color:'var(--tx3)',lineHeight:1.8}}>
                {docsData.map(f=><div key={f.id}><strong style={{color:'var(--tx2)'}}>{f.nome}</strong>: {f.documentos.filter(d=>selDocs.includes(d.id)).map(d=>d.nome).join(', ')||'—'}</div>)}
              </div>
            </div>
          </div>
          <div className="card-m mb-3">
            <div style={{padding:'14px 22px',borderBottom:'1px solid var(--bd)'}}><strong>Destinatário</strong></div>
            <div style={{padding:'18px 22px'}}>
              <div className="row g-3">
                <div className="col-12">
                  <label className="form-label">Canal de envio</label>
                  <div className="d-flex gap-2">
                    <button className={`btn flex-1 fw-semibold ${form.canal==='whatsapp'?'btn-success':'btn-outline-secondary'}`} style={{borderRadius:10}} onClick={()=>setForm({...form,canal:'whatsapp'})}>📱 WhatsApp</button>
                    <button className={`btn flex-1 fw-semibold ${form.canal==='email'?'btn-primary':'btn-outline-secondary'}`} style={{borderRadius:10}} onClick={()=>setForm({...form,canal:'email'})}>📧 E-mail</button>
                  </div>
                </div>
                <div className="col-md-6"><label className="form-label">Nome do destinatário *</label><input className="form-control" value={form.dest} onChange={e=>setForm({...form,dest:e.target.value})} placeholder="Nome do cliente / responsável"/></div>
                <div className="col-md-6"><label className="form-label">{form.canal==='whatsapp'?'WhatsApp (DDD + número)':'E-mail'}</label><input className="form-control" value={form.contato} onChange={e=>setForm({...form,contato:e.target.value})} placeholder={form.canal==='whatsapp'?'(11) 99999-9999':'email@empresa.com'}/></div>
                <div className="col-12"><label className="form-label">Observação (opcional)</label><textarea className="form-control" rows={2} value={form.obs} onChange={e=>setForm({...form,obs:e.target.value})} placeholder="Ex: Documentação para obra Av. Paulista, bloco A..."/></div>
              </div>
            </div>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <button className="btn-secondary" onClick={()=>setStep(2)}><i className="bi bi-arrow-left"></i>Voltar</button>
            <button className="btn-primary" style={{fontSize:14,padding:'11px 26px'}} onClick={enviar} disabled={loading}>
              {loading?<><span className="spinner-border spinner-border-sm"></span>Processando...</>:form.canal==='whatsapp'?'📱 Enviar pelo WhatsApp':'📧 Enviar por E-mail'}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ══ DOCS NESFERA ════════════════════════════════════════════════════════ */
const NESFERA_TIPOS=[
  {key:'LTCAT',label:'LTCAT',desc:'Laudo Técnico das Condições Ambientais do Trabalho',icon:'🔬',color:'#EDE9FE',icolor:'#7C3AED'},
  {key:'PCMSO',label:'PCMSO',desc:'Programa de Controle Médico de Saúde Ocupacional',icon:'🏥',color:'#ECFDF5',icolor:'#059669'},
  {key:'PGR',label:'PGR',desc:'Programa de Gerenciamento de Riscos',icon:'⚠️',color:'#FFFBEB',icolor:'#D97706'},
  {key:'Outros',label:'Outros Docs',desc:'Alvarás, licenças e demais documentos da empresa',icon:'📋',color:'#EFF6FF',icolor:'#2563EB'},
];
function DocsNesfera({toast}){
  const[docs,setDocs]=useState([]);const[modal,setModal]=useState(null);const[confirmDel,setConfirmDel]=useState(null);
  const load=()=>dbGetAll('nesfera_docs').then(setDocs);
  useEffect(()=>{load();},[]);
  const delDoc=async id=>{await dbDel('nesfera_docs',id);toast('Documento removido');load();setConfirmDel(null);};
  return(
    <div className="page-anim">
      {modal&&<ModalNesferaDoc tipo={modal} onClose={()=>setModal(null)} onSave={load} toast={toast}/>}
      {confirmDel&&(
        <div className="modal-overlay">
          <div className="mbox" style={{maxWidth:400}}>
            <div className="mbdy text-center" style={{padding:'36px 28px'}}>
              <div style={{fontSize:48,marginBottom:12}}>🗑️</div>
              <h5 style={{fontWeight:700,marginBottom:8}}>Remover documento?</h5>
              <p style={{fontSize:13,color:'var(--tx3)'}}>Esta ação não pode ser desfeita.</p>
            </div>
            <div className="mftr justify-content-center">
              <button className="btn-secondary" onClick={()=>setConfirmDel(null)}>Cancelar</button>
              <button className="btn-danger" onClick={()=>delDoc(confirmDel)}>Remover</button>
            </div>
          </div>
        </div>
      )}
      <div className="row g-3 mb-4">
        {NESFERA_TIPOS.map(tipo=>{
          const tdocs=docs.filter(d=>d.tipo===tipo.key);
          const venc=tdocs.filter(d=>vencSt(d.validade)?.cls==='err').length;
          const vencendo=tdocs.filter(d=>vencSt(d.validade)?.cls==='warn').length;
          return(
            <div key={tipo.key} className="col-md-6 col-lg-3">
              <div className="nesfera-doc-card">
                <div className="doc-type-icon" style={{background:tipo.color,color:tipo.icolor}}>{tipo.icon}</div>
                <div style={{fontWeight:800,fontSize:16,marginBottom:4}}>{tipo.label}</div>
                <div style={{fontSize:11,color:'var(--tx3)',marginBottom:14,lineHeight:1.4}}>{tipo.desc}</div>
                <div style={{display:'flex',gap:6,marginBottom:14,flexWrap:'wrap'}}>
                  <span className="badge-gray">{tdocs.length} doc(s)</span>
                  {venc>0&&<span className="badge-err">{venc} vencido(s)</span>}
                  {vencendo>0&&<span className="badge-warn">{vencendo} vencendo</span>}
                </div>
                <button className="btn-secondary" style={{width:'100%',justifyContent:'center'}} onClick={()=>setModal(tipo.key)}>
                  <i className="bi bi-plus-lg"></i>Adicionar {tipo.label}
                </button>
              </div>
            </div>
          );
        })}
      </div>
      {docs.length>0&&(
        <div className="card-m" style={{overflow:'hidden'}}>
          <div style={{padding:'14px 22px',borderBottom:'1px solid var(--bd)'}}><strong>Todos os documentos da Nesfera</strong></div>
          <table className="table-modern w-100">
            <thead><tr><th>Tipo</th><th>Documento</th><th>Validade</th><th>Status</th><th>Ações</th></tr></thead>
            <tbody>
              {docs.map(doc=>{const v=doc.validade?vencSt(doc.validade):null;const t=NESFERA_TIPOS.find(x=>x.key===doc.tipo);return(
                <tr key={doc.id}>
                  <td><span style={{background:t?.color,color:t?.icolor,padding:'2px 10px',borderRadius:20,fontSize:11,fontWeight:700}}>{doc.tipo}</span></td>
                  <td><div style={{fontWeight:600}}>{doc.nome}</div><div style={{fontSize:11,color:'var(--tx3)'}}>{fmtBytes(doc.tamanho)}</div></td>
                  <td>{fmtDate(doc.validade)}</td>
                  <td>{v?<span className={v.badge}>{v.label}</span>:<span className="badge-gray">—</span>}</td>
                  <td>
                    <div style={{display:'flex',gap:4}}>
                      <a href={doc.arquivo} download={doc.nomeArq||doc.nome} className="btn-ghost" title="Baixar"><i className="bi bi-download"></i></a>
                      <button className="btn-ghost" title="Visualizar" onClick={()=>{const w=window.open();w.document.write(`<iframe src="${doc.arquivo}" style="width:100%;height:100vh;border:none"></iframe>`);}}><i className="bi bi-eye"></i></button>
                      <button className="btn-ghost" style={{color:'var(--err)'}} title="Remover" onClick={()=>setConfirmDel(doc.id)}><i className="bi bi-trash"></i></button>
                    </div>
                  </td>
                </tr>
              );})}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}
function ModalNesferaDoc({tipo,onClose,onSave,toast}){
  const[f,setF]=useState({nome:'',validade:'',obs:''});const[arq,setArq]=useState(null);const[loading,setLoading]=useState(false);
  const tipoInfo=NESFERA_TIPOS.find(t=>t.key===tipo);
  const save=async()=>{
    if(!f.nome||!arq){toast('Preencha nome e anexe um arquivo','error');return;}
    if(arq.size>15*1024*1024){toast('Arquivo muito grande (máx 15MB)','error');return;}
    setLoading(true);
    const b64=await fileToB64(arq);
    await dbAdd('nesfera_docs',{tipo,nome:f.nome,validade:f.validade||null,obs:f.obs,arquivo:b64,tipo_arquivo:arq.type,tamanho:arq.size,nomeArq:arq.name,criadoEm:new Date().toISOString()});
    setLoading(false);toast('Documento adicionado!');onSave();onClose();
  };
  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="mbox">
        <div className="mhdr"><h5>{tipoInfo?.icon} Adicionar {tipo}</h5><button className="btn-ghost" onClick={onClose}><i className="bi bi-x-lg"></i></button></div>
        <div className="mbdy">
          <div className="row g-3">
            <div className="col-12"><label className="form-label">Nome do documento *</label><input className="form-control" value={f.nome} onChange={e=>setF({...f,nome:e.target.value})} placeholder={`Ex: ${tipo} 2025`}/></div>
            <div className="col-12"><label className="form-label">Data de Validade</label><input type="date" className="form-control" value={f.validade} onChange={e=>setF({...f,validade:e.target.value})}/></div>
            <div className="col-12"><label className="form-label">Observação (opcional)</label><textarea className="form-control" rows={2} value={f.obs} onChange={e=>setF({...f,obs:e.target.value})} placeholder="Empresa responsável, número do laudo..."/></div>
            <div className="col-12"><label className="form-label">Arquivo * (PDF, imagem — máx. 15MB)</label><input type="file" className="form-control" accept=".pdf,.doc,.docx,.png,.jpg,.jpeg" onChange={e=>setArq(e.target.files[0])}/>{arq&&<div style={{fontSize:11,color:'var(--tx3)',marginTop:5}}>{arq.name} · {fmtBytes(arq.size)}</div>}</div>
          </div>
        </div>
        <div className="mftr">
          <button className="btn-secondary" onClick={onClose}>Cancelar</button>
          <button className="btn-primary" onClick={save} disabled={loading}>{loading?<><span className="spinner-border spinner-border-sm"></span>Salvando...</>:<><i className="bi bi-upload"></i>Adicionar</>}</button>
        </div>
      </div>
    </div>
  );
}

/* ══ CONTROLE DE BENEFÍCIOS ═════════════════════════════════════════════ */

    let ys=pdfHeader(doc,`${ptMes(mes)} ${ano}`,'Resumo Geral');
    doc.setTextColor(...DARK_PDF);doc.setFontSize(13);doc.setFont('helvetica','bold');

      startY:ys,margin:{left:14,right:14},

      footStyles:{fillColor:[240,253,244],textColor:DARK_PDF,fontStyle:'bold'},
      alternateRowStyles:{fillColor:[248,250,252]},
    });
    doc.save(`PDF_Geral_Nesfera_${ptMes(mes)}${ano}.pdf`);

      {saiuCedoModal&&(

                {k:'cafe',lbl:'☕ Café da manhã',val:saiuCedoModal.b?.cafe?(cfg.valorCafe||0):0,show:!!(cfg.valorCafe&&saiuCedoModal.b?.cafe)},
                {k:'almoco',lbl:'🍽️ Almoço',val:getAlmVal(saiuCedoModal.b?.almoco,saiuCedoModal.b?.almoco_val),show:!!saiuCedoModal.b?.almoco},
                {k:'passagem',lbl:'🚌 Passagem',val:getPasVal(saiuCedoModal.b?.passagem,saiuCedoModal.b?.passagem_val),show:!!saiuCedoModal.b?.passagem},

                  <input type="checkbox" checked={saiuCedoSel[item.k]||false} onChange={e=>setSaiuCedoSel(p=>({...p,[item.k]:e.target.checked}))} style={{width:16,height:16,accentColor:'var(--or)'}}/>
                  <span style={{flex:1,fontSize:13,fontWeight:500}}>{item.lbl}</span>
                  <span style={{fontSize:13,fontWeight:700,color:'var(--tx2)'}}>R$ {item.val.toFixed(2)}</span>

              {(()=>{
                const tot=(saiuCedoSel.cafe?(saiuCedoModal.b?.cafe?(cfg.valorCafe||0):0):0)+

                  (saiuCedoSel.passagem?getPasVal(saiuCedoModal.b?.passagem,saiuCedoModal.b?.passagem_val):0);
                return<div style={{padding:'10px 14px',background:tot>0?'var(--or-bg)':'var(--bg)',borderRadius:8,fontSize:13,fontWeight:700,color:tot>0?'var(--or)':'var(--tx3)',textAlign:'right',marginTop:4}}>

            <div className="mftr">
              <button className="btn-secondary" onClick={()=>setSaiuCedoModal(null)}>Cancelar</button>
              <button className="btn-primary" onClick={confirmarSaiuCedo}><i className="bi bi-check-lg"></i>Confirmar</button>

      {atestadoModal&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setAtestadoModal(null)}>

      {preencherModal==='almoco'&&(

        <div className="row g-3">

              <div style={{padding:8,maxHeight:520,overflowY:'auto'}}>
                {funcs.length===0?<div style={{textAlign:'center',color:'var(--tx3)',padding:20,fontSize:13}}>Nenhum funcionário</div>:

                    const fb=bens.filter(b=>b.funcId===f.id&&b.ano===ano&&b.mes===mes);

                    return(
                      <div key={f.id} style={{padding:'10px 12px',borderRadius:10,cursor:'pointer',marginBottom:4,background:funcSel===f.id?'var(--or-light)':'transparent',border:`1.5px solid ${funcSel===f.id?'var(--or)':'transparent'}`,transition:'all .15s'}} onClick={()=>setFuncSel(f.id)}>

                        <div style={{fontSize:11,color:'var(--tx3)'}}>{cC}☕ · {aC}🍽️ · {pC}🚌</div>

          <div className="col-lg-8">

              <div className="card-m"><div className="empty"><i className="bi bi-person-check"></i><h3>Selecione um colaborador</h3><p style={{fontSize:13}}>Escolha um funcionário ao lado para controlar os benefícios do mês.</p></div></div>

                      </div>

                })()}
                <div style={{padding:'8px 12px',maxHeight:460,overflowY:'auto'}}>
                  {diasComExtra.map(({dia,dow,fim,extra,feriados})=>{

                    const isExtra=extra||b?.tipo==='extra';
                    const isFeriado=feriados&&feriados.length>0;
                    const isAtestado=b?.falta_tipo==='atestado';
                    const dayBg=isAtestado?'#EEF2FF':isExtra?'#F0FDF4':b?.faltou?'#FEF2F2':b?.saiu_cedo?'#FFFBEB':isFeriado?'#FFF7ED':'#FAFBFC';
                    const dayBd=isAtestado?'#C7D2FE':isExtra?'#BBF7D0':b?.faltou?'#FECACA':b?.saiu_cedo?'#FDE68A':isFeriado?'#FED7AA':'var(--bd)';

    setLoading(true);const c=await dbGet('config',1)||{id:1};

/* ══ VENCIMENTOS ════════════════════════════════════════════════════════ */
function Vencimentos(){
  const[docs,setDocs]=useState([]);const[filtro,setFiltro]=useState('todos');
  useEffect(()=>{
    Promise.all([dbGetAll('documentos'),dbGetAll('funcionarios'),dbGetAll('nesfera_docs')]).then(([ds,fs,nd])=>{
      const at=fs.filter(f=>f.ativo!==false);
      const func=ds.filter(d=>d.validade&&at.find(f=>f.id===d.funcId)).map(d=>{const f=at.find(x=>x.id===d.funcId);return{...d,fn:f?.nome,fc:f?.cargo,origem:'Funcionário'};});
      const nes=nd.filter(d=>d.validade).map(d=>({...d,fn:'Nesfera',fc:d.tipo,origem:'Empresa'}));
      setDocs([...func,...nes].sort((a,b)=>a.validade>b.validade?1:-1));
    });
  },[]);
  const fil=docs.filter(d=>{if(filtro==='todos')return true;const v=vencSt(d.validade);if(filtro==='vencidos')return v?.cls==='err';if(filtro==='vencendo')return v?.cls==='warn';return v?.cls==='ok';});
  return(
    <div className="page-anim">
      <div style={{display:'flex',gap:8,marginBottom:20,flexWrap:'wrap'}}>
        {[{k:'todos',l:'Todos'},{k:'vencidos',l:'⚠️ Vencidos'},{k:'vencendo',l:'🟡 Vence em 30d'},{k:'ok',l:'✅ Em dia'}].map(f=>(
          <button key={f.k} className={filtro===f.k?'btn-primary':'btn-secondary'} style={{padding:'7px 16px',fontSize:12}} onClick={()=>setFiltro(f.k)}>{f.l}</button>
        ))}
      </div>
      <div className="card-m" style={{overflow:'hidden'}}>
        {fil.length===0?<div className="empty"><i className="bi bi-calendar-check"></i><h3>Nenhum documento encontrado</h3></div>:(
          <table className="table-modern w-100">
            <thead><tr><th>Documento</th><th>Categoria</th><th>Pertence a</th><th>Validade</th><th>Status</th></tr></thead>
            <tbody>
              {fil.map(d=>{const v=vencSt(d.validade);return(
                <tr key={d.id+d.origem}>
                  <td><div style={{fontWeight:600}}>{fileIcon(d.tipo)} {d.nome}</div></td>
                  <td style={{color:'var(--tx3)'}}>{d.categoria||d.tipo}</td>
                  <td><div style={{fontWeight:500}}>{d.fn}</div><div style={{fontSize:11,color:'var(--tx3)'}}>{d.origem}</div></td>
                  <td>{fmtDate(d.validade)}</td>
                  <td>{v?<span className={v.badge}>{v.label}</span>:<span className="badge-gray">—</span>}</td>
                </tr>
              );})}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}
