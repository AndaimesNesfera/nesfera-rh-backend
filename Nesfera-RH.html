/* ══ ANIVERSÁRIOS ════════════════════════════════════════════════════════ */
function Aniversarios(){
  const[funcs,setFuncs]=useState([]);
  const hoje=new Date();
  useEffect(()=>{dbGetAll('funcionarios').then(fs=>setFuncs(fs.filter(f=>f.ativo!==false&&f.data_nascimento)));},[]);

  // Group by month
  const porMes=useMemo(()=>{
    const map={};
    funcs.forEach(f=>{
      const nasc=new Date(f.data_nascimento+'T12:00:00');
      const m=nasc.getMonth();
      if(!map[m])map[m]=[];
      map[m].push(f);
    });
    // sort each month by day
    Object.values(map).forEach(arr=>arr.sort((a,b)=>{
      const da=new Date(a.data_nascimento+'T12:00:00').getDate();
      const db=new Date(b.data_nascimento+'T12:00:00').getDate();
      return da-db;
    }));
    return map;
  },[funcs]);

  const proximos=useMemo(()=>{
    return funcs.filter(f=>{
      const d=diasParaAniversario(f);
      return d!==null&&d<=30;
    }).sort((a,b)=>diasParaAniversario(a)-diasParaAniversario(b));
  },[funcs]);

  const anivHoje=funcs.filter(f=>aniversarioHoje(f));

  const mesAtual=hoje.getMonth();
  // Show current month first, then remaining months in order
  const mesesOrdenados=[...Array(12).keys()].sort((a,b)=>{
    const na=(a-mesAtual+12)%12;
    const nb=(b-mesAtual+12)%12;
    return na-nb;
  }).filter(m=>porMes[m]);

  return(
    <div className="page-anim">
      {anivHoje.length>0&&(
        <div style={{background:'linear-gradient(135deg,#FFF7ED,#FFEDD5)',border:'2px solid #FED7AA',borderRadius:16,padding:'20px 24px',marginBottom:24,display:'flex',alignItems:'center',gap:16}}>
          <span style={{fontSize:40}}>🎂</span>
          <div>
            <div style={{fontWeight:800,fontSize:16,color:'#EA580C',marginBottom:4}}>Aniversário hoje!</div>
            <div style={{fontSize:14,color:'var(--tx2)'}}>{anivHoje.map(f=>f.nome).join(', ')}</div>
          </div>
        </div>
      )}
      {proximos.length>0&&(
        <div className="card-m mb-4" style={{overflow:'hidden'}}>
          <div style={{padding:'14px 22px',borderBottom:'1px solid var(--bd)',fontWeight:700,fontSize:14}}>📅 Próximos 30 dias</div>
          <div style={{padding:'12px 22px'}}>
            {proximos.map(f=>{
              const dias=diasParaAniversario(f);
              const nasc=new Date(f.data_nascimento+'T12:00:00');
              const isHoje=dias===0;
              return(
                <div key={f.id} style={{display:'flex',alignItems:'center',gap:14,padding:'10px 0',borderBottom:'1px solid #F8FAFC'}}>
                  <div className="avatar" style={{width:40,height:40,fontSize:18,background:'linear-gradient(135deg,#FED7AA,#FDBA74)',flexShrink:0}}>
                    {f.foto?<img src={f.foto} alt={f.nome}/>:'👷'}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:600}}>{f.nome} {isHoje&&'🎂'}</div>
                    <div style={{fontSize:11,color:'var(--tx3)'}}>{f.cargo||'—'} · {nasc.getDate()} de {ptMes(nasc.getMonth())}</div>
                  </div>
                  <span style={{
                    fontSize:11,fontWeight:700,padding:'3px 10px',borderRadius:20,
                    background:isHoje?'#FFF7ED':'#F8FAFC',
                    color:isHoje?'#EA580C':'var(--tx3)',
                    border:`1px solid ${isHoje?'#FED7AA':'var(--bd)'}`
                  }}>{isHoje?'Hoje!':`em ${dias} dia${dias===1?'':'s'}`}</span>
                </div>
              );
            })}
          </div>
        </div>
      )}
      {funcs.length===0?(
        <div className="card-m"><div className="empty"><i className="bi bi-balloon-heart"></i><h3>Nenhum aniversariante cadastrado</h3><p style={{fontSize:13}}>Adicione datas de nascimento no cadastro dos funcionários.</p></div></div>
      ):(
        mesesOrdenados.map(m=>(
          <div key={m} className="card-m mb-3" style={{overflow:'hidden'}}>
            <div style={{padding:'12px 22px',borderBottom:'1px solid var(--bd)',background:m===mesAtual?'#FFF7ED':'#FAFBFC',display:'flex',alignItems:'center',gap:10}}>
              <span style={{fontWeight:700,fontSize:14,color:m===mesAtual?'#EA580C':'var(--tx)'}}>{ptMes(m)}</span>
              {m===mesAtual&&<span style={{fontSize:11,background:'#FED7AA',color:'#EA580C',padding:'1px 8px',borderRadius:20,fontWeight:700}}>Mês atual</span>}
              <span style={{fontSize:11,color:'var(--tx3)',marginLeft:'auto'}}>{porMes[m].length} aniversariante(s)</span>
            </div>
            <div style={{padding:'8px 22px'}}>
              {porMes[m].map(f=>{
                const nasc=new Date(f.data_nascimento+'T12:00:00');
                const isHoje=aniversarioHoje(f);
                const proxAniv=diasParaAniversario(f);
                return(
                  <div key={f.id} style={{display:'flex',alignItems:'center',gap:14,padding:'10px 0',borderBottom:'1px solid #F8FAFC'}}>
                    <div style={{width:32,textAlign:'center',flexShrink:0}}>
                      <div style={{fontSize:16,fontWeight:800,color:isHoje?'#EA580C':'var(--tx)'}}>{nasc.getDate()}</div>
                    </div>
                    <div className="avatar" style={{width:36,height:36,fontSize:16,background:'linear-gradient(135deg,#FED7AA,#FDBA74)',flexShrink:0}}>
                      {f.foto?<img src={f.foto} alt={f.nome}/>:'👷'}
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:600}}>{f.nome} {isHoje&&'🎂'}</div>
                      <div style={{fontSize:11,color:'var(--tx3)'}}>{f.cargo||'—'}</div>
                    </div>
                    {proxAniv!==null&&proxAniv<=30&&(
                      <span style={{fontSize:11,fontWeight:600,color:isHoje?'#EA580C':'#2563EB',background:isHoje?'#FFF7ED':'#EFF6FF',padding:'2px 8px',borderRadius:20,border:`1px solid ${isHoje?'#FED7AA':'#BFDBFE'}`}}>
                        {isHoje?'Hoje!':proxAniv===1?'Amanhã':`${proxAniv}d`}
                      </span>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        ))
      )}
    </div>
  );
}

/* ══ FÉRIAS CLT ═════════════════════════════════════════════════════════ */
function Ferias({toast}){
  const[funcs,setFuncs]=useState([]);
  const[feriasList,setFeriasList]=useState([]);
  const[selFunc,setSelFunc]=useState(null);
  const[view,setView]=useState('lista');// 'lista'|'detalhe'
  const[modalGozo,setModalGozo]=useState(null);// {periodoNum, periodoData}
  const[gozoForm,setGozoForm]=useState({inicio:'',fim:'',obs:''});
  const[confirmDelGozo,setConfirmDelGozo]=useState(null);

  const load=async()=>{
    const[fs,fl]=await Promise.all([dbGetAll('funcionarios'),dbGetAll('ferias')]);
    setFuncs(fs.filter(f=>f.ativo!==false));
    setFeriasList(fl);
  };
  useEffect(()=>{load();},[]);

  const getFeriasFunc=fid=>feriasList.filter(f=>f.funcId===fid);

  // Get or build period record from DB (or computed)
  const getPeriodoRecord=(fid,num,periodoCalc)=>{
    return feriasList.find(f=>f.funcId===fid&&f.periodo_num===num)||{
      funcId:fid,periodo_num:num,
      aquisitivo_inicio:periodoCalc.aquisitivo_inicio,
      aquisitivo_fim:periodoCalc.aquisitivo_fim,
      concessivo_fim:periodoCalc.concessivo_fim,
      dias_devidos:30,gozo:[],liquidada:false
    };
  };

  const diasGozadosTotal=rec=>((rec?.gozo)||[]).reduce((s,g)=>s+g.dias,0);

  const abrirModalGozo=(func,num,periodoCalc)=>{
    setModalGozo({func,num,periodoCalc});
    setGozoForm({inicio:'',fim:'',obs:''});
  };

  const calcDiasGozo=()=>{
    if(!gozoForm.inicio||!gozoForm.fim)return 0;
    const d=diffDays(gozoForm.inicio,gozoForm.fim)+1;
    return d>0?d:0;
  };

  const salvarGozo=async()=>{
    if(!gozoForm.inicio||!gozoForm.fim){toast('Preencha as datas','error');return;}
    const dias=calcDiasGozo();
    if(dias<=0){toast('Data final deve ser após data inicial','error');return;}
    const{func,num,periodoCalc}=modalGozo;
    const rec=getPeriodoRecord(func.id,num,periodoCalc);
    const jaGozados=diasGozadosTotal(rec);
    if(jaGozados+dias>30){toast(`Excede o limite! Ainda pode tirar ${30-jaGozados} dias neste período.`,'error');return;}
    const novoGozo={inicio:gozoForm.inicio,fim:gozoForm.fim,dias,obs:gozoForm.obs,registradoEm:new Date().toISOString()};
    const novoRec={...rec,gozo:[...(rec.gozo||[]),novoGozo]};
    if(rec.id)await dbPut('ferias',novoRec);
    else await dbAdd('ferias',novoRec);
    await load();
    setModalGozo(null);
    toast(`✅ ${dias} dia(s) de férias registrado(s)!`);
  };

  const removerGozo=async(func,num,periodoCalc,gozoIdx)=>{
    const rec=getPeriodoRecord(func.id,num,periodoCalc);
    if(!rec.id)return;
    const novoGozo=(rec.gozo||[]).filter((_,i)=>i!==gozoIdx);
    await dbPut('ferias',{...rec,gozo:novoGozo});
    await load();
    setConfirmDelGozo(null);
    toast('Período de gozo removido');
  };

  const funcAtual=useMemo(()=>funcs.find(f=>f.id===selFunc),[funcs,selFunc]);

  // Compute alerts for list view
  const alertas=useMemo(()=>{
    const al=[];
    funcs.forEach(f=>{
      if(!f.data_admissao)return;
      const periodos=calcPeriodosFerias(f.data_admissao);
      periodos.forEach(p=>{
        const rec=getPeriodoRecord(f.id,p.num,p);
        const gozados=diasGozadosTotal(rec);
        const st=statusFerias(p,gozados);
        if(st.urgente)al.push({func:f,periodo:p,status:st,gozados});
      });
    });
    return al;
  },[funcs,feriasList]);

  const periodosFunc=useMemo(()=>{
    if(!funcAtual?.data_admissao)return[];
    return calcPeriodosFerias(funcAtual.data_admissao);
  },[funcAtual]);

  return(
    <div className="page-anim">
      {/* Modal registrar gozo */}
      {modalGozo&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setModalGozo(null)}>
          <div className="mbox" style={{maxWidth:440}}>
            <div className="mhdr">
              <h5>🏖️ Registrar Férias — {modalGozo.func.nome}</h5>
              <button className="btn-ghost" onClick={()=>setModalGozo(null)}><i className="bi bi-x-lg"></i></button>
            </div>
            <div className="mbdy">
              <div style={{background:'#EFF6FF',borderRadius:10,padding:'10px 14px',marginBottom:16,fontSize:12,color:'#1D4ED8'}}>
                📅 Período aquisitivo {ptMesAbrev(new Date(modalGozo.periodoCalc.aquisitivo_inicio+'T12:00:00').getMonth())+'/'+new Date(modalGozo.periodoCalc.aquisitivo_inicio+'T12:00:00').getFullYear()} a {ptMesAbrev(new Date(modalGozo.periodoCalc.aquisitivo_fim+'T12:00:00').getMonth())+'/'+new Date(modalGozo.periodoCalc.aquisitivo_fim+'T12:00:00').getFullYear()} · Vence concessivo: {fmtDate(modalGozo.periodoCalc.concessivo_fim)}
              </div>
              <div className="row g-3">
                <div className="col-6"><label className="form-label">Início das férias *</label><input type="date" className="form-control" value={gozoForm.inicio} onChange={e=>setGozoForm(p=>({...p,inicio:e.target.value}))}/></div>
                <div className="col-6"><label className="form-label">Fim das férias *</label><input type="date" className="form-control" value={gozoForm.fim} onChange={e=>setGozoForm(p=>({...p,fim:e.target.value}))}/></div>
                <div className="col-12"><label className="form-label">Observação</label><input className="form-control" value={gozoForm.obs} onChange={e=>setGozoForm(p=>({...p,obs:e.target.value}))} placeholder="Ex: Férias parceladas, adiantamento..."/></div>
              </div>
              {gozoForm.inicio&&gozoForm.fim&&calcDiasGozo()>0&&(
                <div style={{marginTop:12,padding:'8px 14px',background:'var(--ok-bg)',borderRadius:8,fontSize:13,fontWeight:600,color:'#059669'}}>
                  ✅ {calcDiasGozo()} dia(s) de férias
                </div>
              )}
            </div>
            <div className="mftr">
              <button className="btn-secondary" onClick={()=>setModalGozo(null)}>Cancelar</button>
              <button className="btn-primary" onClick={salvarGozo}><i className="bi bi-check-lg me-1"></i>Registrar</button>
            </div>
          </div>
        </div>
      )}
      {/* Confirm del gozo */}
      {confirmDelGozo&&(
        <div className="modal-overlay">
          <div className="mbox" style={{maxWidth:360}}>
            <div className="mbdy text-center" style={{padding:'32px 24px'}}>
              <div style={{fontSize:40,marginBottom:12}}>🗑️</div>
              <h5 style={{fontWeight:700,marginBottom:8}}>Remover este gozo?</h5>
              <p style={{fontSize:13,color:'var(--tx3)'}}>Os dias voltarão a estar disponíveis no período.</p>
            </div>
            <div className="mftr justify-content-center">
              <button className="btn-secondary" onClick={()=>setConfirmDelGozo(null)}>Cancelar</button>
              <button className="btn-danger" onClick={()=>removerGozo(confirmDelGozo.func,confirmDelGozo.num,confirmDelGozo.periodoCalc,confirmDelGozo.gozoIdx)}>Remover</button>
            </div>
          </div>
        </div>
      )}

      {/* Alertas de urgência */}
      {alertas.length>0&&view==='lista'&&(
        <div className="card-m mb-4" style={{overflow:'hidden'}}>
          <div style={{padding:'12px 20px',borderBottom:'1px solid var(--bd)',fontWeight:700,fontSize:13,color:'var(--err)'}}>⚠️ Atenção — Férias vencendo ou vencidas</div>
          {alertas.map((a,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:14,padding:'10px 20px',borderBottom:'1px solid #F8FAFC',background:a.status.status==='vencida'?'var(--err-bg)':'var(--warn-bg)'}}>
              <span style={{fontSize:20}}>{a.status.status==='vencida'?'❌':'⏰'}</span>
              <div style={{flex:1}}>
                <div style={{fontWeight:600,fontSize:13}}>{a.func.nome}</div>
                <div style={{fontSize:11,color:'var(--tx3)'}}>Período {a.periodo.num} · {a.gozados}/30 dias gozados · Concessivo até {fmtDate(a.periodo.concessivo_fim)}</div>
              </div>
              <span className={a.status.badge}>{a.status.label}</span>
              <button className="btn-secondary" style={{padding:'4px 12px',fontSize:11}} onClick={()=>{setSelFunc(a.func.id);setView('detalhe');}}>Ver</button>
            </div>
          ))}
        </div>
      )}

      {view==='lista'&&(
        <div className="row g-3">
          {funcs.length===0&&<div className="card-m col-12"><div className="empty"><i className="bi bi-people"></i><h3>Nenhum funcionário cadastrado</h3></div></div>}
          {funcs.map(f=>{
            if(!f.data_admissao)return(
              <div key={f.id} className="col-12 col-md-6 col-xl-4">
                <div className="card-m" style={{padding:16,cursor:'pointer'}} onClick={()=>{setSelFunc(f.id);setView('detalhe');}}>
                  <div style={{fontWeight:700,fontSize:14,marginBottom:4}}>{f.nome}</div>
                  <span className="badge-gray">Sem data de admissão</span>
                </div>
              </div>
            );
            const periodos=calcPeriodosFerias(f.data_admissao);
            const ultimoPeriodo=periodos[periodos.length-1];
            if(!ultimoPeriodo)return null;
            const rec=getPeriodoRecord(f.id,ultimoPeriodo.num,ultimoPeriodo);
            const gozados=diasGozadosTotal(rec);
            const st=statusFerias(ultimoPeriodo,gozados);
            return(
              <div key={f.id} className="col-12 col-md-6 col-xl-4">
                <div className="card-m" style={{padding:16,cursor:'pointer',transition:'all .2s',borderLeft:`3px solid ${st.cor}`}} onClick={()=>{setSelFunc(f.id);setView('detalhe');}}
                  onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-2px)';e.currentTarget.style.boxShadow='0 8px 28px rgba(0,0,0,.1)';}}
                  onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.boxShadow='';}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:14}}>{f.nome}</div>
                      <div style={{fontSize:11,color:'var(--tx3)'}}>{f.cargo||'—'} · Desde {fmtDate(f.data_admissao)}</div>
                    </div>
                    <span className={st.badge}>{st.label}</span>
                  </div>
                  <div style={{fontSize:12,color:'var(--tx3)'}}>
                    {periodos.length} período(s) · Período {ultimoPeriodo.num} atual
                  </div>
                  {st.status!=='aquisicao'&&st.status!=='encerrada'&&(
                    <div style={{marginTop:8,background:'#F8FAFC',borderRadius:8,padding:'6px 10px'}}>
                      <div style={{fontSize:11,color:'var(--tx3)',marginBottom:3}}>Período {ultimoPeriodo.num}</div>
                      <div style={{display:'flex',alignItems:'center',gap:8}}>
                        <div style={{flex:1,height:6,background:'#E2E8F0',borderRadius:3}}>
                          <div style={{width:`${Math.min((gozados/30)*100,100)}%`,height:'100%',background:st.cor,borderRadius:3,transition:'width .3s'}}></div>
                        </div>
                        <span style={{fontSize:11,fontWeight:700,color:st.cor}}>{gozados}/30d</span>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {view==='detalhe'&&funcAtual&&(
        <div>
          <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
            <button className="btn-secondary" style={{padding:'6px 14px'}} onClick={()=>setView('lista')}><i className="bi bi-arrow-left me-1"></i>Voltar</button>
            <div>
              <div style={{fontWeight:700,fontSize:16}}>{funcAtual.nome}</div>
              <div style={{fontSize:12,color:'var(--tx3)'}}>{funcAtual.cargo||'—'} · Admissão: {fmtDate(funcAtual.data_admissao)||'Não informada'}</div>
            </div>
          </div>
          {!funcAtual.data_admissao?(
            <div className="card-m"><div className="empty"><i className="bi bi-calendar-x"></i><h3>Data de admissão não cadastrada</h3><p style={{fontSize:13}}>Acesse o cadastro do funcionário e informe a data de admissão para calcular os períodos.</p></div></div>
          ):(
            <div>
              {periodosFunc.length===0&&<div className="card-m"><div className="empty"><i className="bi bi-clock-history"></i><h3>Nenhum período aquisitivo completo ainda</h3></div></div>}
              {periodosFunc.map(p=>{
                const rec=getPeriodoRecord(funcAtual.id,p.num,p);
                const gozados=diasGozadosTotal(rec);
                const st=statusFerias(p,gozados);
                const restantes=30-gozados;
                return(
                  <div key={p.num} className="card-m mb-3" style={{overflow:'hidden',borderLeft:`4px solid ${st.cor}`}}>
                    <div style={{padding:'14px 20px',borderBottom:'1px solid var(--bd)',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
                      <div>
                        <span style={{fontWeight:700,fontSize:14}}>Período {p.num}</span>
                        <span style={{fontSize:12,color:'var(--tx3)',marginLeft:12}}>
                          Aquisitivo: {fmtDate(p.aquisitivo_inicio)} → {fmtDate(p.aquisitivo_fim)}
                        </span>
                        <span style={{fontSize:12,color:'var(--tx3)',marginLeft:12}}>
                          Concessivo até: {fmtDate(p.concessivo_fim)}
                        </span>
                      </div>
                      <div style={{display:'flex',alignItems:'center',gap:8}}>
                        <span className={st.badge}>{st.label}</span>
                        {st.status!=='aquisicao'&&st.status!=='encerrada'&&restantes>0&&(
                          <button className="btn-primary" style={{padding:'5px 12px',fontSize:11}} onClick={()=>abrirModalGozo(funcAtual,p.num,p)}>
                            <i className="bi bi-plus-lg me-1"></i>Registrar gozo
                          </button>
                        )}
                      </div>
                    </div>
                    {st.status!=='aquisicao'&&(
                      <div style={{padding:'12px 20px'}}>
                        {/* Progress bar */}
                        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
                          <div style={{flex:1,height:8,background:'#E2E8F0',borderRadius:4}}>
                            <div style={{width:`${Math.min((gozados/30)*100,100)}%`,height:'100%',background:st.cor,borderRadius:4}}></div>
                          </div>
                          <span style={{fontSize:12,fontWeight:700,color:st.cor,minWidth:70,textAlign:'right'}}>{gozados} / 30 dias</span>
                        </div>
                        {/* Lista de gozos */}
                        {(rec.gozo||[]).length===0?(
                          <div style={{fontSize:12,color:'var(--tx3)',textAlign:'center',padding:'12px',fontStyle:'italic'}}>Nenhum gozo registrado neste período</div>
                        ):(
                          <div>
                            {(rec.gozo||[]).map((g,gi)=>(
                              <div key={gi} style={{display:'flex',alignItems:'center',gap:12,padding:'8px 12px',background:'#F0FDF4',borderRadius:8,marginBottom:6,border:'1px solid #BBF7D0'}}>
                                <span style={{fontSize:18}}>🏖️</span>
                                <div style={{flex:1}}>
                                  <div style={{fontSize:13,fontWeight:600}}>{fmtDate(g.inicio)} → {fmtDate(g.fim)}</div>
                                  <div style={{fontSize:11,color:'var(--tx3)'}}>{g.dias} dia(s){g.obs?` · ${g.obs}`:''}</div>
                                </div>
                                <button className="btn-ghost" style={{color:'var(--err)',padding:'4px 8px'}} onClick={()=>setConfirmDelGozo({func:funcAtual,num:p.num,periodoCalc:p,gozoIdx:gi})}><i className="bi bi-trash"></i></button>
                              </div>
                            ))}
                          </div>
                        )}
                        {st.status==='vencida'&&(
                          <div style={{marginTop:8,padding:'8px 12px',background:'var(--err-bg)',borderRadius:8,fontSize:12,color:'var(--err)',fontWeight:600}}>
                            ⚠️ Férias vencidas! De acordo com a CLT, o pagamento deve ser em dobro.
                          </div>
                        )}
                      </div>
                    )}
                    {st.status==='aquisicao'&&(
                      <div style={{padding:'12px 20px',fontSize:12,color:'var(--tx3)',fontStyle:'italic'}}>
                        Período aquisitivo ainda em curso — completa em {fmtDate(p.aquisitivo_fim)}.
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ══ USUARIOS E SENHAS ══════════════════════════════════════════════════ */
function Usuarios({toast}){
  const[users,setUsers]=useState([]);
  const[modal,setModal]=useState(null);
  const[form,setForm]=useState({nome:'',username:'',senha:'',confirma:'',role:'operador'});
  const[loading,setLoading]=useState(false);
  const[confirmExcluir,setConfirmExcluir]=useState(null);
  const load=async()=>{const all=await dbGetAll('usuarios').catch(()=>[]);setUsers(all);};
  useEffect(()=>{load();},[]);
  const abrirNovo=()=>{setForm({nome:'',username:'',senha:'',confirma:'',role:'operador'});setModal('novo');};
  const abrirEditar=u=>{setForm({nome:u.nome,username:u.username,senha:'',confirma:'',role:u.role||'operador'});setModal(u);};
  const salvar=async()=>{
    if(!form.nome.trim()||!form.username.trim()){toast('Nome e usuário são obrigatórios.','error');return;}
    if(modal==='novo'&&!form.senha){toast('Senha obrigatória para novo usuário.','error');return;}
    if(form.senha&&form.senha!==form.confirma){toast('As senhas não coincidem.','error');return;}
    if(form.senha&&form.senha.length<4){toast('Senha deve ter pelo menos 4 caracteres.','error');return;}
    const existe=users.find(u=>u.username===form.username.trim()&&(modal==='novo'||u.id!==modal.id));
    if(existe){toast('Este nome de usuário já está em uso.','error');return;}
    setLoading(true);
    try{
      if(modal==='novo'){
        await dbPut('usuarios',{nome:form.nome.trim(),username:form.username.trim(),hash:hashPwd(form.senha),role:form.role,criadoEm:new Date().toISOString().slice(0,10),ativo:true});
        toast('Usuário criado com sucesso!');
      }else{
        const upd={...modal,nome:form.nome.trim(),username:form.username.trim(),role:form.role};
        if(form.senha)upd.hash=hashPwd(form.senha);
        await dbPut('usuarios',upd);
        toast('Usuário atualizado!');
      }
      setModal(null);load();
    }catch(e){toast('Erro ao salvar.','error');}
    setLoading(false);
  };
  const toggleAtivo=async u=>{await dbPut('usuarios',{...u,ativo:u.ativo===false});toast(u.ativo===false?'Usuário reativado.':'Usuário desativado.');load();};
  const excluirUser=async u=>{await dbDel('usuarios',u.id);toast('Usuário excluído.');setConfirmExcluir(null);load();};
  const roleLabel=r=>r==='admin'?'Administrador':r==='visualizador'?'Visualizador':'Operador';
  const roleColor=r=>r==='admin'?{bg:'#FEF3C7',tx:'#D97706'}:r==='visualizador'?{bg:'#E0F2FE',tx:'#0369A1'}:{bg:'#F0FDF4',tx:'#15803D'};
  return(
    <div className="page-anim">
      {modal&&(
        <div className="modal-overlay">
          <div className="mbox" style={{maxWidth:480}}>
            <div className="mhdr">
              <h5 className="mttl"><i className="bi bi-person-lock me-2"></i>{modal==='novo'?'Novo Usuário':'Editar Usuário'}</h5>
              <button className="mclose" onClick={()=>setModal(null)}><i className="bi bi-x-lg"></i></button>
            </div>
            <div className="mbdy">
              <div className="row g-3">
                <div className="col-12">
                  <label className="form-label">Nome completo</label>
                  <input className="form-control" value={form.nome} onChange={e=>setForm({...form,nome:e.target.value})} placeholder="Ex: João Silva"/>
                </div>
                <div className="col-md-6">
                  <label className="form-label">Usuário (login)</label>
                  <input className="form-control" value={form.username} onChange={e=>setForm({...form,username:e.target.value.toLowerCase().replace(/\s/g,'')})} placeholder="Ex: joao.silva"/>
                </div>
                <div className="col-md-6">
                  <label className="form-label">Perfil de acesso</label>
                  <select className="form-select" value={form.role} onChange={e=>setForm({...form,role:e.target.value})}>
                    <option value="admin">Administrador</option>
                    <option value="operador">Operador</option>
                    <option value="visualizador">Visualizador</option>
                  </select>
                </div>
                <div className="col-md-6">
                  <label className="form-label">{modal==='novo'?'Senha':'Nova senha (vazio = manter atual)'}</label>
                  <input type="password" className="form-control" value={form.senha} onChange={e=>setForm({...form,senha:e.target.value})} placeholder="Mínimo 4 caracteres"/>
                </div>
                <div className="col-md-6">
                  <label className="form-label">Confirmar senha</label>
                  <input type="password" className="form-control" value={form.confirma} onChange={e=>setForm({...form,confirma:e.target.value})} placeholder="Repita a senha"/>
                </div>
              </div>
            </div>
            <div className="mftr">
              <button className="btn-secondary" onClick={()=>setModal(null)}>Cancelar</button>
              <button className="btn-primary" onClick={salvar} disabled={loading}><i className={`bi bi-${loading?'hourglass-split':'check-lg'} me-1`}></i>{loading?'Salvando...':'Salvar'}</button>
            </div>
          </div>
        </div>
      )}
      {confirmExcluir&&(
        <div className="modal-overlay">
          <div className="mbox" style={{maxWidth:400}}>
            <div className="mbdy text-center" style={{padding:'36px 28px'}}>
              <div style={{fontSize:48,marginBottom:12}}>🗑️</div>
              <h5 style={{fontWeight:700,marginBottom:8}}>Excluir usuário?</h5>
              <p style={{fontSize:13,color:'var(--tx3)'}}>O usuário <strong>{confirmExcluir.nome}</strong> será removido permanentemente. Esta ação não pode ser desfeita.</p>
            </div>
            <div className="mftr justify-content-center gap-2">
              <button className="btn-secondary" onClick={()=>setConfirmExcluir(null)}>Cancelar</button>
              <button className="btn-danger" onClick={()=>excluirUser(confirmExcluir)}>Excluir</button>
            </div>
          </div>
        </div>
      )}
      <div className="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h4 style={{fontWeight:700,margin:0}}>Usuários do Sistema</h4>
          <p style={{fontSize:13,color:'var(--tx3)',marginTop:2}}>Gerencie os acessos ao Nesfera RH</p>
        </div>
        <button className="btn-primary" onClick={abrirNovo}><i className="bi bi-person-plus-fill me-1"></i>Novo Usuário</button>
      </div>
      <div className="card-m mb-3" style={{padding:'14px 20px',background:'#FFFBEB',border:'1px solid #FDE68A'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <i className="bi bi-info-circle-fill" style={{color:'#D97706',fontSize:16}}></i>
          <div style={{fontSize:13}}>
            <strong style={{color:'#92400E'}}>Usuário administrador principal:</strong>
            <span style={{color:'#78350F',marginLeft:6}}>admin</span>
            <span style={{color:'var(--tx3)',marginLeft:6}}>— gerencie usuário e senha em <em>Configurações</em>.</span>
          </div>
        </div>
      </div>
      {users.length===0?(
        <div className="card-m"><div className="empty">
          <i className="bi bi-person-lock" style={{fontSize:40,color:'var(--tx3)',marginBottom:12}}></i>
          <h3>Nenhum usuário adicional</h3>
          <p style={{fontSize:13}}>Crie usuários para compartilhar o acesso ao sistema com sua equipe.</p>
        </div></div>
      ):(
        <div className="card-m" style={{overflow:'hidden'}}>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead>
              <tr style={{background:'#FAFBFC',borderBottom:'2px solid var(--bd)'}}>
                {['USUÁRIO','LOGIN','PERFIL','CRIADO EM','STATUS','AÇÕES'].map((h,i)=>(
                  <th key={i} style={{padding:'12px 18px',fontSize:11,fontWeight:700,color:'var(--tx3)',textAlign:i===5?'right':'left',letterSpacing:.5}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {users.map(u=>{const rc=roleColor(u.role);return(
                <tr key={u.id} style={{borderBottom:'1px solid var(--bd)',transition:'background .15s',opacity:u.ativo===false?0.55:1}}>
                  <td style={{padding:'14px 18px'}}>
                    <div style={{display:'flex',alignItems:'center',gap:10}}>
                      <div style={{width:36,height:36,borderRadius:10,background:'linear-gradient(135deg,var(--or),var(--or2))',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:15,fontWeight:700,flexShrink:0}}>
                        {(u.nome||u.username||'?').charAt(0).toUpperCase()}
                      </div>
                      <span style={{fontWeight:600,fontSize:13}}>{u.nome||'—'}</span>
                    </div>
                  </td>
                  <td style={{padding:'14px 18px',fontSize:13,color:'var(--tx2)',fontFamily:'monospace'}}>{u.username}</td>
                  <td style={{padding:'14px 18px'}}>
                    <span style={{fontSize:11,padding:'3px 10px',borderRadius:20,fontWeight:600,background:rc.bg,color:rc.tx}}>{roleLabel(u.role)}</span>
                  </td>
                  <td style={{padding:'14px 18px',fontSize:13,color:'var(--tx3)'}}>{u.criadoEm?fmtDate(u.criadoEm):'—'}</td>
                  <td style={{padding:'14px 18px'}}>
                    <span className={u.ativo===false?'badge-err':'badge-ok'}>{u.ativo===false?'Inativo':'Ativo'}</span>
                  </td>
                  <td style={{padding:'14px 18px',textAlign:'right'}}>
                    <div style={{display:'flex',gap:4,justifyContent:'flex-end'}}>
                      <button className="btn-ghost" title="Editar" onClick={()=>abrirEditar(u)}><i className="bi bi-pencil"></i></button>
                      <button className="btn-ghost" title={u.ativo===false?'Reativar':'Desativar'} onClick={()=>toggleAtivo(u)}>
                        <i className={`bi bi-person-${u.ativo===false?'check':'slash'}`}></i>
                      </button>
                      <button className="btn-ghost" style={{color:'var(--err)'}} title="Excluir" onClick={()=>setConfirmExcluir(u)}><i className="bi bi-trash"></i></button>
                    </div>
                  </td>
                </tr>
              );})}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

/* ══ APP ════════════════════════════════════════════════════════════════ */
const MENU=[
  {sec:'Principal'},
  {p:'kpi',i:'bi-bar-chart-fill',l:'Dashboard'},
  {p:'dashboard',i:'bi-grid-1x2-fill',l:'Menu'},
  {p:'funcionarios',i:'bi-people-fill',l:'Funcionários'},
  {p:'envio',i:'bi-send-fill',l:'Envio de Documentos'},
  {sec:'Segurança e Docs'},
  {p:'nesfera_docs',i:'bi-building-fill',l:'Docs Nesfera'},
  {p:'vencimentos',i:'bi-calendar-x-fill',l:'Vencimento de Docs'},
  {sec:'RH'},
  {p:'beneficios',i:'bi-cup-hot-fill',l:'Café, Almoço e Passagem'},
  {p:'ferias',i:'bi-umbrella-fill',l:'Férias'},
  {p:'aniversarios',i:'bi-balloon-heart-fill',l:'Aniversários'},
  {p:'historico',i:'bi-clock-history',l:'Histórico de Envios'},
  {sec:'Sistema'},
  {p:'usuarios',i:'bi-shield-lock-fill',l:'Usuários'},
  {p:'configuracoes',i:'bi-gear-fill',l:'Configurações'},
];
const PAGE_TITLES={kpi:'Dashboard',dashboard:'Menu',funcionarios:'Funcionários',perfil:'Perfil do Colaborador',envio:'Envio de Documentos',nesfera_docs:'Documentos da Nesfera',vencimentos:'Vencimento de Documentos',beneficios:'Café, Almoço e Passagem',ferias:'Controle de Férias',aniversarios:'Calendário de Aniversários',historico:'Histórico de Envios',usuarios:'Usuários e Senhas',configuracoes:'Configurações'};

function App(){
  const[loggedIn,setLoggedIn]=useState(!!sessionStorage.getItem('nrh_user'));
  const[user,setUser]=useState(sessionStorage.getItem('nrh_user')||'');
  const[page,setPage]=useState('kpi');const[perfilId,setPerfilId]=useState(null);
  const[envioPreIds,setEnvioPreIds]=useState(null);
  const{list:toasts,toast}=useToast();
  const doLogin=(u)=>{sessionStorage.setItem('nrh_user',u);setUser(u);setLoggedIn(true);};
  const doLogout=()=>{sessionStorage.removeItem('nrh_user');setLoggedIn(false);setUser('');};
  const nav=p=>{setPage(p);setPerfilId(null);setEnvioPreIds(null);};
  const openPerfil=id=>{setPerfilId(id);setPage('perfil');};
  const openEnvio=ids=>{setEnvioPreIds(ids);setPage('envio');};
  if(!loggedIn)return<><Login onLogin={doLogin}/><Toasts list={toasts}/></>;
  return(
    <>
      <div id="sidebar">
        <div className="sb-logo">
          <div className="brand"><NesferaLogo size={38}/><span style={{letterSpacing:1.5,textTransform:'uppercase',fontSize:14,fontWeight:900,color:'#fff',marginLeft:8}}>NESFERA</span></div>
          <div className="sub" style={{letterSpacing:1,textTransform:'uppercase',fontSize:9,paddingLeft:4}}>Andaimes e Escoramentos</div>
        </div>
        <nav className="sb-nav">
          {MENU.map((item,i)=>{
            if(item.sec)return<div key={i} className="sb-sec">{item.sec}</div>;
            const isActive=page===item.p||(item.p==='funcionarios'&&page==='perfil');
            return(
              <div key={item.p} className={`ni ${isActive?'active':''}`} onClick={()=>nav(item.p)}>
                <span className="ni-icon"><i className={`bi ${item.i}`}></i></span>{item.l}
              </div>
            );
          })}
        </nav>
        <div className="sb-user">
          <div className="sb-user-inner">
            <div className="sb-avatar">👤</div>
            <div><div className="sb-user-name">{user}</div><div className="sb-user-role">Administrador</div></div>
            <button className="sb-logout" onClick={doLogout} title="Sair"><i className="bi bi-box-arrow-right"></i></button>
          </div>
        </div>
      </div>
      <div id="main">
        <div className="topbar">
          <div className="tb-left">
            <div className="tb-title">{PAGE_TITLES[page]||'Nesfera RH'}</div>
          </div>
          <div style={{fontSize:12,color:'var(--tx3)',display:'flex',alignItems:'center',gap:6}}>
            <i className="bi bi-calendar3"></i>{new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'})}
          </div>
        </div>
        <div className="pc">
          {page==='kpi'&&<DashboardKPI onNav={nav}/>}
          {page==='dashboard'&&<Dashboard onNav={nav}/>}
          {page==='funcionarios'&&<Funcionarios onPerfil={openPerfil} toast={toast}/>}
          {page==='perfil'&&perfilId&&<Perfil id={perfilId} onBack={()=>nav('funcionarios')} toast={toast} onEnvio={openEnvio}/>}
          {page==='envio'&&<Envio toast={toast} preIds={envioPreIds}/>}
          {page==='nesfera_docs'&&<DocsNesfera toast={toast}/>}
          {page==='beneficios'&&<Beneficios toast={toast}/>}
          {page==='ferias'&&<Ferias toast={toast}/>}
          {page==='vencimentos'&&<Vencimentos/>}
          {page==='aniversarios'&&<Aniversarios/>}
          {page==='historico'&&<Historico/>}
          {page==='usuarios'&&<Usuarios toast={toast}/>}
          {page==='configuracoes'&&<Configuracoes toast={toast}/>}
        </div>
      </div>
      <Toasts list={toasts}/>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
